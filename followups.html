<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9;display:none}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:white;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
padding:10px 16px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Top Card */
.top-card{
background:linear-gradient(135deg,#3B82F6,#1E40AF);
color:white;padding:20px;border-radius:14px;margin-bottom:20px;
}

/* Filters */
.filters{
display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
}

/* Card */
.card{
background:white;padding:18px;border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.label{font-size:12px;color:#64748B;}
.value{font-size:14px;margin-bottom:6px;}

.assign{
margin-top:10px;
padding:8px;
width:100%;
background:#22C55E;
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;padding:25px;border-radius:14px;
width:380px;max-height:90vh;overflow-y:auto;
}

.popup input,.popup select,.popup textarea{
width:100%;padding:10px;margin-bottom:10px;
border-radius:8px;border:1px solid #ccc;
}

.actions{display:flex;gap:10px;}
.save-btn{
flex:1;padding:10px;background:#2563EB;color:white;border:none;border-radius:8px;
}
.cancel-btn{
flex:1;padding:10px;background:#E2E8F0;border:none;border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
<div class="menu-item" onclick="go('my-day.html')">My Day</div>
<div class="menu-item active">All Leads</div>
<div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

<div class="header">
<h1>All Leads</h1>
<button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<div class="top-card">
<h2 id="totalLeads">0 Leads</h2>
<p>Total available leads</p>
</div>

<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">

<select id="assignFilter" onchange="render()">
<option value="">All Leads</option>
<option value="unassigned">Unassigned</option>
<option value="assigned">Assigned</option>
</select>
</div>

<div class="grid" id="container"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="area" placeholder="Area">
<input id="budgetMin" placeholder="Budget Min">
<input id="budgetMax" placeholder="Budget Max">

<textarea id="remark" placeholder="Remark"></textarea>

<div class="actions">
<button class="cancel-btn" onclick="closePopup()">Cancel</button>
<button class="save-btn" onclick="addLead()">Save</button>
</div>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let currentUser="";
let allLeads={};

auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
document.body.style.display="block";
currentUser=user.email.split("@")[0];
load();
}
});

function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

function render(){

let search=val("search").toLowerCase();
let assignF=val("assignFilter");

let container=document.getElementById("container");
container.innerHTML="";

let count=0;

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(search && !l.name.toLowerCase().includes(search)) return;
if(assignF==="unassigned" && l.assignedTo) return;
if(assignF==="assigned" && !l.assignedTo) return;

count++;

let btn="";
if(!l.assignedTo){
btn=`<button class="assign" onclick="assign('${id}')">Assign to Me</button>`;
}

container.innerHTML+=`
<div class="card">

<h3>${l.name}</h3>

<div class="label">📱 Mobile</div>
<div class="value">${l.phone}</div>

<div class="label">📍 Location</div>
<div class="value">${l.location || "-"}</div>

<div class="label">💰 Budget</div>
<div class="value">₹${l.budgetMin || "-"} - ₹${l.budgetMax || "-"}</div>

<p><b>Assigned:</b> ${l.assignedTo || "None"}</p>

${btn}

</div>
`;
});

document.getElementById("totalLeads").innerText = count + " Leads";

}

/* ADD LEAD WITH DATE */
function addLead(){

let name=val("name").trim();
let phone=val("phone").trim();

if(!name || !phone){
alert("Enter name & phone");
return;
}

let now=new Date();

let key=db.ref("leads").push().key;

db.ref("leads/"+key).set({
leadId:"L-"+Date.now(),
name,
phone,
location:val("location"),
area:val("area"),
budgetMin:val("budgetMin"),
budgetMax:val("budgetMax"),
remark:val("remark"),
status:"new",
assignedTo:"",

/* ✅ NEW FIELD */
createdDate:now.toISOString().split("T")[0],
createdTime:now.toLocaleTimeString()

}).then(()=>{
clearForm();
closePopup();
});

}

/* ASSIGN */
function assign(id){

db.ref("leads/"+id).update({
assignedTo:currentUser
});

let ref=db.ref("users/"+currentUser+"/leads");

ref.once("value").then(s=>{
let v=s.val()||0;
ref.set(v+1);
});

}

/* HELPERS */
function val(id){return document.getElementById(id).value}
function go(p){window.location.href=p;}

function clearForm(){
document.querySelectorAll(".popup input, textarea").forEach(i=>i.value="");
}

function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

</script>

</body>
</html>
