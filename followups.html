<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:white;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.btn{
padding:10px 16px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;border:none;border-radius:8px;cursor:pointer;
}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:20px}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Cards */
.leads-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{transform:translateY(-4px)}

.title{font-size:18px;font-weight:600}
.meta{font-size:13px;color:#64748B;margin-bottom:8px}

.tag{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:11px;
margin-right:5px;
background:#DBEAFE;
}

.manage{
margin-top:12px;
width:100%;
padding:8px;
background:#22C55E;
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:14px;
width:380px;
}

.popup input,.popup select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.actions{display:flex;justify-content:space-between}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item">Dashboard</div>
<div class="menu-item">My Leads</div>
<div class="menu-item">My Day</div>
<div class="menu-item active">All Leads</div>
</div>

<div class="main">

<div class="header">
<h1>All Leads</h1>
<button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">
<select id="typeFilter" onchange="render()">
<option value="">All</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>
</div>

<div class="leads-container" id="leadsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="area" placeholder="Area">

<input id="budgetMin" placeholder="Min Budget">
<input id="budgetMax" placeholder="Max Budget">

<select id="type">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="propertyType">
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="urgency">
<option value="low">Low</option>
<option value="high">High</option>
</select>

<div class="actions">
<button onclick="closePopup()">Cancel</button>
<button onclick="addLead()">Save</button>
</div>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let currentUser="";
let allLeads={};

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user.email.split("@")[0];
load();
}
});

/* LOAD */
function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

/* RENDER */
function render(){

let search=document.getElementById("search").value.toLowerCase();
let typeFilter=document.getElementById("typeFilter").value;

let container=document.getElementById("leadsContainer");
container.innerHTML="";

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(search && !l.name.toLowerCase().includes(search)) return;
if(typeFilter && l.type!==typeFilter) return;

let statusUI="";

/* 🔐 ONLY ASSIGNED USER CAN EDIT */
if(l.assignedTo===currentUser){
statusUI=`
<select onchange="updateStatus('${id}',this.value)">
<option ${l.status==="new"?"selected":""}>new</option>
<option ${l.status==="contacted"?"selected":""}>contacted</option>
<option ${l.status==="visit"?"selected":""}>visit</option>
<option ${l.status==="closed"?"selected":""}>closed</option>
</select>`;
}else{
statusUI=`<p>Status: ${l.status}</p>`;
}

let assignBtn="";
if(!l.assignedTo){
assignBtn=`<button class="manage" onclick="assign('${id}')">Assign to Me</button>`;
}

container.innerHTML+=`
<div class="card">

<div class="title">${l.name}</div>
<div class="meta">${l.phone} • ${l.location}</div>

<div>
<span class="tag">${l.type}</span>
<span class="tag">${l.propertyType}</span>
<span class="tag">${l.urgency}</span>
</div>

<p style="margin-top:10px">₹${l.budgetMin}-${l.budgetMax}</p>
<p>ID: ${l.leadId}</p>

${statusUI}

<p>Assigned: ${l.assignedTo || "None"}</p>

${assignBtn}

</div>
`;
});
}

/* ADD LEAD */
async function addLead(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Enter name & phone");
return;
}

try{

let snap=await db.ref("meta/lastLeadId").get();
let last=snap.exists()?snap.val():0;

let newId=last+1;
let leadId="L"+String(newId).padStart(3,"0");

let key=Date.now();

await db.ref("leads/"+key).set({
leadId,
name,
phone,
location:location.value,
area:area.value,
budgetMin:budgetMin.value,
budgetMax:budgetMax.value,
type:type.value,
propertyType:propertyType.value,
urgency:urgency.value,
status:"new",
assignedTo:""
});

await db.ref("meta/lastLeadId").set(newId);

/* CLEAR */
document.querySelectorAll(".popup input").forEach(i=>i.value="");

closePopup();

}catch(e){
console.error(e);
alert("Error saving lead");
}

}

/* ASSIGN */
function assign(id){
db.ref("leads/"+id).update({assignedTo:currentUser});
db.ref("users/"+currentUser+"/myLeads/"+id).set(true);
}

/* STATUS */
function updateStatus(id,status){
db.ref("leads/"+id).update({status});
}

/* POPUP */
function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

</script>

</body>
</html>
