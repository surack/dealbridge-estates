<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:#fff;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:20px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn{padding:10px 15px;background:#2563EB;color:#fff;border:none;border-radius:6px;cursor:pointer}

/* Cards */
.leads-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.lead-card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
position:relative;
}

.lead-card:hover{transform:translateY(-4px)}

.lead-title{
font-size:18px;
font-weight:600;
margin-bottom:5px;
}

.lead-meta{
font-size:13px;
color:#64748B;
margin-bottom:8px;
}

.badge{
display:inline-block;
padding:4px 8px;
font-size:11px;
border-radius:6px;
margin-right:5px;
}

.buy{background:#DBEAFE}
.rent{background:#FEE2E2}
.high{background:#FECACA}
.low{background:#DCFCE7}

/* Assign button */
.manage{
margin-top:12px;
padding:8px;
width:100%;
background:#2563EB;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:14px;
width:360px;
}

.popup input,.popup select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.actions{
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>
  <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item active">All Leads</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">
  <div class="header">
    <h1>All Leads</h1>
    <button class="btn" onclick="openPopup()">+ Add Lead</button>
  </div>

  <div class="leads-container" id="leadsContainer"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">

    <h3>Add Lead</h3>

    <input id="name" placeholder="Client Name">
    <input id="phone" placeholder="Phone">
    <input id="location" placeholder="Location">
    <input id="area" placeholder="Area (sq ft)">

    <input id="budgetMin" placeholder="Budget Min">
    <input id="budgetMax" placeholder="Budget Max">

    <select id="type">
      <option value="buy">Buy</option>
      <option value="rent">Rent</option>
    </select>

    <select id="category">
      <option value="residential">Residential</option>
      <option value="commercial">Commercial</option>
    </select>

    <select id="propertyType">
      <option value="house">House</option>
      <option value="shop">Shop</option>
      <option value="plot">Plot</option>
    </select>

    <select id="urgency">
      <option value="low">Low Urgency</option>
      <option value="high">High Urgency</option>
    </select>

    <div class="actions">
      <button onclick="closePopup()">Cancel</button>
      <button onclick="addLead()">Save</button>
    </div>

  </div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let currentUser="";

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user.email.split("@")[0];
loadLeads();
}
});

/* LOAD LEADS */
function loadLeads(){

db.ref("leads").on("value",snap=>{
let data=snap.val();
let container=document.getElementById("leadsContainer");
container.innerHTML="";

for(let id in data){

let l=data[id];

let assignBtn="";
if(!l.assignedTo){
assignBtn=`<button class="manage" onclick="assignLead('${id}')">Assign to Me</button>`;
}

container.innerHTML+=`
<div class="lead-card">

<div class="lead-title">${l.name}</div>
<div class="lead-meta">${l.phone} • ${l.location}</div>

<div>
<span class="badge ${l.type}">${l.type}</span>
<span class="badge">${l.propertyType}</span>
<span class="badge ${l.urgency}">${l.urgency}</span>
</div>

<p style="margin-top:10px">₹${l.budgetMin} - ₹${l.budgetMax}</p>
<p>Area: ${l.area} sq ft</p>

<p style="margin-top:8px;font-size:12px;color:#64748B">
ID: ${l.leadId} | Assigned: ${l.assignedTo || "None"}
</p>

${assignBtn}

</div>
`;
}
});
}

/* ADD LEAD */
function addLead(){

let nameVal=document.getElementById("name").value.trim();
let phoneVal=document.getElementById("phone").value.trim();

if(nameVal==="" || phoneVal===""){
alert("Name and Phone required");
return;
}

db.ref("meta/lastLeadId").once("value").then(snap=>{

let last=snap.val()||0;
let newId=last+1;

let leadId="L"+String(newId).padStart(3,"0");
let key=Date.now();

db.ref("leads/"+key).set({
leadId,
name:nameVal,
phone:phoneVal,
location:location.value,
area:area.value,
budgetMin:budgetMin.value,
budgetMax:budgetMax.value,
type:type.value,
category:category.value,
propertyType:propertyType.value,
urgency:urgency.value,
assignedTo:""
});

db.ref("meta/lastLeadId").set(newId);

/* CLEAR FORM */
document.querySelectorAll(".popup input").forEach(i=>i.value="");

/* CLOSE */
closePopup();

});
}

/* ASSIGN */
function assignLead(id){

db.ref("leads/"+id).update({
assignedTo:currentUser
});

db.ref("users/"+currentUser+"/myLeads/"+id).set(true);

}

/* POPUP */
function openPopup(){ popup.style.display="flex"; }
function closePopup(){ popup.style.display="none"; }

function go(p){window.location.href=p;}

</script>

</body>
</html>
