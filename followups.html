<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:white;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn{
padding:10px 16px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Filters */
.filters{
display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Cards */
.leads-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.tag{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:11px;
margin-right:5px;
background:#DBEAFE;
}

.status-tag{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:11px;
background:#DCFCE7;
margin-top:5px;
}

.manage{
margin-top:10px;
width:100%;
padding:8px;
background:#22C55E;
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

/* 🔥 SCROLLABLE FORM FIX */
.popup-box{
background:white;
padding:25px;
border-radius:14px;
width:380px;
max-height:90vh;
overflow-y:auto;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.popup-box h3{
margin-bottom:20px;
}

.popup input,.popup select,.popup textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.save-btn{
flex:1;
padding:10px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.cancel-btn{
flex:1;
padding:10px;
background:#E2E8F0;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item">Dashboard</div>
<div class="menu-item">My Leads</div>
<div class="menu-item">My Day</div>
<div class="menu-item active">All Leads</div>
</div>

<div class="main">

<div class="header">
<h1>All Leads</h1>
<button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<!-- FILTERS -->
<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">

<select id="typeFilter" onchange="render()">
<option value="">All Type</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="categoryFilter" onchange="render()">
<option value="">All Category</option>
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
</select>

<select id="propertyFilter" onchange="render()">
<option value="">All Property</option>
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="statusFilter" onchange="render()">
<option value="">All Status</option>
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="visit">Visit</option>
<option value="closed">Closed</option>
</select>

<select id="assignFilter" onchange="render()">
<option value="">All Leads</option>
<option value="unassigned">Unassigned</option>
<option value="assigned">Assigned</option>
</select>
</div>

<div class="leads-container" id="leadsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Preferred Location">

<input id="area" placeholder="Area Required (sq ft)">
<input id="budgetMin" placeholder="Budget Min">
<input id="budgetMax" placeholder="Budget Max">

<select id="type">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="category">
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
</select>

<select id="propertyType">
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="urgency">
<option value="low">Low Urgency</option>
<option value="high">High Urgency</option>
</select>

<textarea id="remark" placeholder="Remark (optional)"></textarea>

<div class="actions">
<button class="cancel-btn" onclick="closePopup()">Cancel</button>
<button class="save-btn" onclick="addLead()">Save</button>
</div>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let allLeads={};
let currentUser="";

auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user.email.split("@")[0];
load();
}
});

function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

function render(){

let search=val("search").toLowerCase();
let typeF=val("typeFilter");
let catF=val("categoryFilter");
let propF=val("propertyFilter");
let statusF=val("statusFilter");
let assignF=val("assignFilter");

let container=document.getElementById("leadsContainer");
container.innerHTML="";

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(search && !l.name.toLowerCase().includes(search)) return;
if(typeF && l.type!==typeF) return;
if(catF && l.category!==catF) return;
if(propF && l.propertyType!==propF) return;
if(statusF && l.status!==statusF) return;

if(assignF==="unassigned" && l.assignedTo) return;
if(assignF==="assigned" && !l.assignedTo) return;

let btn="";
if(!l.assignedTo){
btn=`<button class="manage" onclick="assign('${id}')">Assign to Me</button>`;
}

container.innerHTML+=`
<div class="card">

<h3>${l.name}</h3>
<p>${l.phone}</p>

<p style="color:#64748B;font-size:13px">${l.location || ""}</p>

<div style="margin:8px 0">
<span class="tag">${l.type}</span>
<span class="tag">${l.category}</span>
<span class="tag">${l.propertyType}</span>
<span class="tag">${l.urgency}</span>
</div>

<p>💰 ₹${l.budgetMin || "-"} - ₹${l.budgetMax || "-"}</p>
<p>📐 ${l.area || "-"} sq ft</p>

<p style="font-size:12px;color:#64748B">ID: ${l.leadId}</p>

<div class="status-tag">Status: ${l.status}</div>

<p>Assigned: ${l.assignedTo || "None"}</p>

${l.remark ? `<p style="margin-top:8px">📝 ${l.remark}</p>` : ""}

${btn}

</div>
`;
});
}

function addLead(){

let name=val("name").trim();
let phone=val("phone").trim();

if(!name || !phone){
alert("Enter name & phone");
return;
}

let key=db.ref("leads").push().key;
let leadId="L-"+Date.now();

db.ref("leads/"+key).set({
leadId,
name,
phone,
location:val("location"),
area:val("area"),
budgetMin:val("budgetMin"),
budgetMax:val("budgetMax"),
type:val("type"),
category:val("category"),
propertyType:val("propertyType"),
urgency:val("urgency"),
remark:val("remark"),
status:"new",
assignedTo:""
}).then(()=>{
clearForm();
closePopup();
});

}

function val(id){return document.getElementById(id).value}

function clearForm(){
document.querySelectorAll(".popup input, .popup textarea").forEach(i=>i.value="");
}

function assign(id){
db.ref("leads/"+id).update({assignedTo:currentUser});
}

function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

</script>

</body>
</html>
