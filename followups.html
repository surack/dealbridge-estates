<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
body { background:#F1F5F9; }

/* Sidebar */
.sidebar {
  width:180px; height:100vh;
  background:#1E293B; color:white;
  padding:20px; position:fixed;
}
.logo { font-size:22px; font-weight:700; margin-bottom:30px; }
.menu-item { padding:10px; margin:10px 0; cursor:pointer; border-radius:8px; }
.menu-item:hover, .active { background:#2563EB; }

/* Main */
.main {
  margin-left:200px;
  padding:20px;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn {
  padding:10px 15px;
  background:#2563EB;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* Lead cards */
.leads-container {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap:15px;
}

.lead-card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.manage {
  margin-top:10px;
  padding:6px;
  background:#2563EB;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* Popup Professional */
.popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:white;
  padding:25px;
  border-radius:12px;
  width:350px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.popup-box h3 {
  margin-bottom:15px;
}

.popup input, .popup select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item active">All Leads</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

  <div class="header">
    <h1>All Leads</h1>
    <button class="btn" onclick="openPopup()">+ Add Lead</button>
  </div>

  <div class="leads-container" id="leadsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">

    <h3>Add Lead</h3>

    <input id="name" placeholder="Client Name">
    <input id="phone" placeholder="Phone">

    <input id="location" placeholder="Preferred Location">
    <input id="area" placeholder="Area Required (sq ft)">

    <input id="budgetMin" placeholder="Budget Min">
    <input id="budgetMax" placeholder="Budget Max">

    <select id="type">
      <option value="buy">Buy</option>
      <option value="rent">Rent</option>
    </select>

    <select id="category">
      <option value="residential">Residential</option>
      <option value="commercial">Commercial</option>
    </select>

    <select id="propertyType">
      <option value="house">House</option>
      <option value="shop">Shop</option>
      <option value="plot">Plot</option>
    </select>

    <select id="urgency">
      <option value="low">Low Urgency</option>
      <option value="high">High Urgency</option>
    </select>

    <button onclick="addLead()">Save Lead</button>

  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
  authDomain: "deal-bridge-estates.firebaseapp.com",
  databaseURL: "https://deal-bridge-estates-default-rtdb.firebaseio.com/",
  projectId: "deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = "";

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  } else {
    currentUser = user.email.split("@")[0];
    loadLeads();
  }
});

/* LOAD LEADS */
function loadLeads(){

  db.ref("leads").on("value", snap=>{

    let data = snap.val();
    let container = document.getElementById("leadsContainer");
    container.innerHTML = "";

    for(let id in data){

      let l = data[id];

      let manageBtn = "";

      if(!l.assignedTo){
        manageBtn = `<button class="manage" onclick="assignLead('${id}')">Manage</button>`;
      }

      container.innerHTML += `
        <div class="lead-card">
          <h3>${l.name}</h3>
          <p>${l.phone}</p>
          <p>${l.type} | ${l.category} | ${l.propertyType}</p>
          <p>${l.location}</p>
          <p>${l.area} sq ft</p>
          <p>₹${l.budgetMin} - ₹${l.budgetMax}</p>
          <p>Urgency: ${l.urgency}</p>
          <p>Assigned: ${l.assignedTo || "None"}</p>
          ${manageBtn}
        </div>
      `;
    }

  });

}

/* ADD LEAD */
function addLead(){

  let id = Date.now();

  db.ref("leads/"+id).set({
    name: name.value,
    phone: phone.value,
    location: location.value,
    area: area.value,
    budgetMin: budgetMin.value,
    budgetMax: budgetMax.value,
    type: type.value,
    category: category.value,
    propertyType: propertyType.value,
    urgency: urgency.value,
    assignedTo: ""
  });

  clearForm();   // ✅ FIX
  closePopup();
}

/* CLEAR FORM */
function clearForm(){
  document.querySelectorAll(".popup input").forEach(i => i.value="");
}

/* ASSIGN LEAD */
function assignLead(id){

  db.ref("leads/"+id).update({
    assignedTo: currentUser
  });

  // store only reference
  db.ref("users/"+currentUser+"/myLeads/"+id).set(true);
}

/* POPUP */
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function go(p){ window.location.href=p; }

</script>

</body>
</html>
