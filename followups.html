<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:#fff;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:20px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:15px}
.btn{padding:10px;background:#2563EB;color:white;border:none;border-radius:6px}

/* Filters */
.filters{
display:flex;
gap:10px;
margin-bottom:15px;
}

.filters select, .filters input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

/* Cards */
.leads-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
}

.lead-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

/* Status dropdown */
.status-select{
margin-top:8px;
padding:5px;
}

/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:12px;
width:350px;
}

.popup input,.popup select{
width:100%;
padding:8px;
margin-bottom:8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>
  <div class="menu-item">Dashboard</div>
  <div class="menu-item">My Leads</div>
  <div class="menu-item">My Day</div>
  <div class="menu-item active">All Leads</div>
</div>

<div class="main">

<div class="header">
  <h1>All Leads</h1>
  <button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <input type="text" id="search" placeholder="Search..." oninput="applyFilters()">

  <select id="filterType" onchange="applyFilters()">
    <option value="">All Type</option>
    <option value="buy">Buy</option>
    <option value="rent">Rent</option>
  </select>

  <select id="filterUrgency" onchange="applyFilters()">
    <option value="">All Urgency</option>
    <option value="high">High</option>
    <option value="low">Low</option>
  </select>
</div>

<div class="leads-container" id="leadsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="area" placeholder="Area">

<input id="budgetMin" placeholder="Min Budget">
<input id="budgetMax" placeholder="Max Budget">

<select id="type">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="propertyType">
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="urgency">
<option value="low">Low</option>
<option value="high">High</option>
</select>

<button onclick="addLead()">Save</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let allLeads={};
let currentUser="";

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user.email.split("@")[0];
loadLeads();
}
});

/* LOAD */
function loadLeads(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
applyFilters();
});
}

/* FILTER + SEARCH */
function applyFilters(){

let search=document.getElementById("search").value.toLowerCase();
let type=document.getElementById("filterType").value;
let urgency=document.getElementById("filterUrgency").value;

let container=document.getElementById("leadsContainer");
container.innerHTML="";

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(search && !(l.name.toLowerCase().includes(search) || l.phone.includes(search) || l.location.toLowerCase().includes(search))) return;
if(type && l.type!==type) return;
if(urgency && l.urgency!==urgency) return;

let btn="";
if(!l.assignedTo){
btn=`<button onclick="assignLead('${id}')">Assign</button>`;
}

container.innerHTML+=`
<div class="lead-card">
<h3>${l.name}</h3>
<p>${l.phone}</p>
<p>${l.location}</p>
<p>₹${l.budgetMin}-${l.budgetMax}</p>
<p>ID: ${l.leadId}</p>

<select class="status-select" onchange="updateStatus('${id}',this.value)">
<option ${l.status==="new"?"selected":""}>new</option>
<option ${l.status==="contacted"?"selected":""}>contacted</option>
<option ${l.status==="visit"?"selected":""}>visit</option>
<option ${l.status==="closed"?"selected":""}>closed</option>
</select>

<p>Assigned: ${l.assignedTo || "None"}</p>

${btn}
</div>
`;
});
}

/* ADD */
async function addLead(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill required fields");
return;
}

let snap=await db.ref("meta/lastLeadId").get();
let last=snap.exists()?snap.val():0;

let newId=last+1;
let leadId="L"+String(newId).padStart(3,"0");

let key=Date.now();

await db.ref("leads/"+key).set({
leadId,
name,
phone,
location:location.value,
area:area.value,
budgetMin:budgetMin.value,
budgetMax:budgetMax.value,
type:type.value,
propertyType:propertyType.value,
urgency:urgency.value,
status:"new",
assignedTo:""
});

await db.ref("meta/lastLeadId").set(newId);

/* clear */
document.querySelectorAll(".popup input").forEach(i=>i.value="");

closePopup();
}

/* ASSIGN */
function assignLead(id){
db.ref("leads/"+id).update({assignedTo:currentUser});
db.ref("users/"+currentUser+"/myLeads/"+id).set(true);
}

/* STATUS */
function updateStatus(id,status){
db.ref("leads/"+id).update({status});
}

/* POPUP */
function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

</script>

</body>
</html>
