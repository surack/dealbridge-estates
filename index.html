<!DOCTYPE html>
<html>
<head>
  <title>DealBridge Estates - Login</title>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    height: 100vh;
    background: linear-gradient(135deg, #1E3A8A, #2563EB);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    top: -50%;
    left: -50%;
    animation: moveBg 20s linear infinite;
  }

  @keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(50px,50px); }
  }

  .container {
    display: flex;
    width: 900px;
    height: 500px;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
  }

  .left {
    width: 50%;
    background: linear-gradient(135deg, #2563EB, #1E40AF);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
  }

  .left h1 { font-size: 32px; margin-bottom: 10px; }

  .right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
  }

  .right h2 {
    margin-bottom: 20px;
    color: #1E293B;
  }

  input {
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    padding: 12px;
    border: none;
    background: #2563EB;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover { background: #1E40AF; }

  .error {
    color: red;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>DealBridge Estates</h1>
    <p>Smart CRM for managing leads, properties & deals.</p>
  </div>

  <div class="right">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="message" class="error"></p>
  </div>

</div>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
  authDomain: "deal-bridge-estates.firebaseapp.com",
  projectId: "deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then((userCredential) => {

    let userEmail = userCredential.user.email;

    let username = userEmail.split("@")[0];
    localStorage.setItem("username", username);

    if(userEmail === "admin@gmail.com"){
      window.location.href = "admin-dashboard.html";
    } else {
      window.location.href = "dashboard.html";
    }

  })
  .catch((error) => {

    let message = "";

    switch(error.code){

      case "auth/user-not-found":
        message = "User not found";
        break;

      case "auth/wrong-password":
        message = "Incorrect password";
        break;

      case "auth/invalid-email":
        message = "Invalid email format";
        break;

      case "auth/invalid-credential":
        message = "Invalid email or password";
        break;

      case "auth/too-many-requests":
        message = "Too many attempts. Try again later.";
        break;

      default:
        message = "Login failed. Please try again.";
    }

    document.getElementById("message").innerText = message;
  });
}
</script>

</body>
</html>
