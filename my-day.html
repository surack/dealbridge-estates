<!DOCTYPE html>
<html>
<head>
<title>My Day</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{
width:180px;height:100vh;
background:#1E293B;color:white;
padding:20px;position:fixed;
}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer;}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* Top Cards */
.cards{
display:flex;
gap:20px;
margin-bottom:25px;
}

.card{
flex:1;
padding:20px;
border-radius:14px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.calls{background:linear-gradient(135deg,#3B82F6,#1E40AF);}
.visits{background:linear-gradient(135deg,#22C55E,#15803D);}

/* Grid */
.grid{
display:flex;
gap:20px;
}

/* Section */
.section{
flex:1;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

/* Section title */
.section h2{
margin-bottom:15px;
color:#1E293B;
}

/* Task Card */
.task{
background:#F8FAFC;
padding:15px;
border-radius:10px;
margin-bottom:12px;
border-left:4px solid #2563EB;
}

/* Labels */
.label{font-size:12px;color:#64748B;}
.value{font-size:14px;margin-bottom:5px;}

.time{
font-size:13px;
font-weight:600;
color:#2563EB;
margin-top:5px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>

<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
<div class="menu-item active">My Day</div>
<div class="menu-item" onclick="go('followups.html')">All Leads</div>
<div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

<div class="header">
<h1>My Day</h1>
</div>

<!-- TOP CARDS -->
<div class="cards">
<div class="card calls">
<h4>Today's Calls</h4>
<h2 id="callCount">0</h2>
</div>

<div class="card visits">
<h4>Today's Visits</h4>
<h2 id="visitCount">0</h2>
</div>
</div>

<div class="grid">

<!-- CALLS -->
<div class="section">
<h2>📞 Calls</h2>
<div id="callsContainer"></div>
</div>

<!-- VISITS -->
<div class="section">
<h2>🏠 Visits</h2>
<div id="visitsContainer"></div>
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let currentUser="";

auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
currentUser=user.email.split("@")[0];
load();
}
});

function load(){

let today=new Date().toISOString().split("T")[0];

db.ref("leads").on("value",snap=>{

let leads=snap.val()||{};

let callsContainer=document.getElementById("callsContainer");
let visitsContainer=document.getElementById("visitsContainer");

callsContainer.innerHTML="";
visitsContainer.innerHTML="";

let callCount=0;
let visitCount=0;

Object.keys(leads).forEach(id=>{

let l=leads[id];

if(l.assignedTo !== currentUser) return;

/* CALLS */
if(l.callDate === today){

callCount++;

callsContainer.innerHTML+=`
<div class="task">

<div class="label">Client</div>
<div class="value">${l.name}</div>

<div class="label">Phone</div>
<div class="value">${l.phone}</div>

<div class="label">Location</div>
<div class="value">${l.location || "-"}</div>

<div class="time">🕒 ${l.callTime || "-"}</div>

</div>
`;
}

/* VISITS */
if(l.visitDate === today){

visitCount++;

visitsContainer.innerHTML+=`
<div class="task">

<div class="label">Client</div>
<div class="value">${l.name}</div>

<div class="label">Location</div>
<div class="value">${l.location || "-"}</div>

<div class="label">Budget</div>
<div class="value">₹${l.budgetMin || "-"} - ${l.budgetMax || "-"}</div>

<div class="time">🕒 ${l.visitTime || "-"}</div>

</div>
`;
}

});

document.getElementById("callCount").innerText = callCount;
document.getElementById("visitCount").innerText = visitCount;

});

}

function go(p){window.location.href=p;}

</script>

</body>
</html>
