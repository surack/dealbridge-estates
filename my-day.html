<!DOCTYPE html>
<html>
<head>
<title>My Day</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
body { display:flex; background:#F1F5F9; }

/* Sidebar */
.sidebar {
  width:180px; height:100vh;
  background:#1E293B; color:white;
  padding:20px; position:fixed;
}

.logo { font-size:22px; font-weight:700; margin-bottom:30px; }

.menu-item { padding:10px; margin:10px 0; cursor:pointer; border-radius:8px; }
.menu-item:hover, .active { background:#2563EB; }

/* Main */
.main {
  margin-left:200px;
  padding:20px;
  width:calc(100% - 200px);
}

/* Heading spacing */
.main h1 {
  margin-bottom:20px;
}

/* GRID LAYOUT */
.grid {
  display:flex;
  gap:20px;
}

/* Section boxes */
.section {
  flex:1;
}

/* Section title */
.section h2 {
  margin-bottom:15px;
  color:#1E293B;
}

/* Task cards */
.task {
  background:white;
  padding:15px;
  margin-bottom:12px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item active">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">
  <h1>My Day</h1>

  <div class="grid">

    <!-- CALLS -->
    <div class="section">
      <h2>📞 Calls</h2>

      <div class="task">
        Call Ravi - Pending
      </div>

      <div class="task">
        Call Neha - Follow-up
      </div>

    </div>

    <!-- VISITS -->
    <div class="section">
      <h2>🏠 Scheduled Visits</h2>

      <div class="task">
        Visit Amit - 4 PM
      </div>

      <div class="task">
        Visit Raj - 6 PM
      </div>

    </div>

  </div>
</div>

<script>
function go(p){ window.location.href=p; }
</script>

</body>
</html>
