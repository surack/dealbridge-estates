<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - DealBridge Estates</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      background: #F1F5F9;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #1E293B;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .menu-item {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .menu-item:hover,
    .active {
      background: #2563EB;
    }

    /* Main */
    .main {
      margin-left: 240px;
      width: 100%;
      padding: 20px;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout {
      background: #EF4444;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card p {
      font-size: 22px;
      margin-top: 10px;
      color: #2563EB;
    }

    /* Table */
    .table-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #F8FAFC;
    }

    /* Button */
    .btn {
      background: #2563EB;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1E40AF;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

  </style>

</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DealBridge</h2>
    <div class="menu-item active">Dashboard</div>
    <div class="menu-item">My Leads</div>
    <div class="menu-item">Follow-ups</div>
    <div class="menu-item">Properties</div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1>Dashboard</h1>

      <div class="profile">
        <span>Sales User</span>
        <button class="logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>My Leads</h3>
        <p>12</p>
      </div>

      <div class="card">
        <h3>Follow-ups</h3>
        <p>3</p>
      </div>

      <div class="card">
        <h3>Deals Closed</h3>
        <p>2</p>
      </div>
    </div>

    <!-- Add Lead Button -->
    <button class="btn" onclick="openModal()">+ Add Lead</button>

    <!-- Table -->
    <div class="table-section">
      <h3>Recent Leads</h3>

      <table>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>Ravi</td>
          <td>9876543210</td>
          <td>New</td>
        </tr>

      </table>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>Add Lead</h3>
      <input placeholder="Name">
      <input placeholder="Phone">
      <button class="btn" onclick="closeModal()">Save</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function logout() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
