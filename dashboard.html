<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - DealBridge Estates</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      background: #F1F5F9;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #1E293B;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    .menu-item {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.85;
    }

    .menu-item:hover,
    .active {
      background: #2563EB;
      opacity: 1;
    }

    /* Main */
    .main {
      margin-left: 230px;
      width: 100%;
      padding: 20px;
    }

    /* Top */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 {
      color: #1E293B;
    }

    .logout {
      cursor: pointer;
      font-size: 20px;
      color: #EF4444;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .card h4 {
      color: #64748B;
      font-size: 14px;
    }

    .card p {
      font-size: 22px;
      margin-top: 8px;
      color: #2563EB;
    }

    /* Banner */
    .banner {
      background: #2563EB;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    /* Grid */
    .grid {
      display: flex;
      gap: 20px;
    }

    .box {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      DealBridge <br> Estates CRM
    </div>

    <div class="menu-item active">Dashboard</div>
    <div class="menu-item">My Leads</div>
    <div class="menu-item">My Day</div>
    <div class="menu-item">Follow-ups</div>
    <div class="menu-item">My Properties</div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <h1>Good Morning, Amit 👋</h1>
      <div class="logout" onclick="logout()">⎋</div>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h4>Total Leads</h4>
        <p>120</p>
      </div>

      <div class="card">
        <h4>Deals Closed</h4>
        <p>25</p>
      </div>

      <div class="card">
        <h4>Total Revenue</h4>
        <p>₹5,00,000</p>
      </div>

      <div class="card">
        <h4>Follow-ups</h4>
        <p>8</p>
      </div>
    </div>

    <!-- Banner -->
    <div class="banner">
      📢 3 tasks scheduled today. Complete them to improve your performance!
    </div>

    <!-- Charts -->
    <div class="grid">

      <div class="box">
        <h3>Sales Performance</h3>
        <canvas id="salesChart"></canvas>
      </div>

      <div class="box">
        <h3>Monthly Growth</h3>
        <canvas id="growthChart"></canvas>
      </div>

    </div>

  </div>

  <script>
    function logout() {
      window.location.href = "index.html";
    }

    // Sales Chart
    new Chart(document.getElementById("salesChart"), {
      type: 'line',
      data: {
        labels: ["Jan","Feb","Mar","Apr","May"],
        datasets: [{
          label: "Deals",
          data: [5, 8, 6, 10, 12],
          borderWidth: 2,
          tension: 0.4
        }]
      }
    });

    // Monthly Growth Chart (UPDATED)
    new Chart(document.getElementById("growthChart"), {
      type: 'bar',
      data: {
        labels: ["Jan","Feb","Mar","Apr","May","Jun"],
        datasets: [{
          label: "Revenue",
          data: [10000, 20000, 15000, 30000, 25000, 35000],
          borderWidth: 1
        }]
      }
    });
  </script>

</body>
</html>
