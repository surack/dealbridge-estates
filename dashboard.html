<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }

    body { display:flex; background:#F1F5F9; }

    .sidebar {
      width:180px; height:100vh;
      background:#1E293B; color:white;
      padding:20px; position:fixed;
      top:0; left:0;
    }

    .logo { font-size:22px; font-weight:700; margin-bottom:30px; }

    .menu-item {
      padding:10px; margin:10px 0;
      border-radius:8px; cursor:pointer;
    }

    .menu-item:hover, .active { background:#2563EB; }

    .main {
      margin-left:240px;
      padding:20px;
      width:calc(100% - 140px);
    }

    .topbar {
      display:flex; justify-content:space-between;
      align-items:center;
    }

    .logout { font-size:26px; cursor:pointer; color:#EF4444; }

    .cards { display:flex; gap:15px; margin:20px 0; }

    .card {
      flex:1; background:white; padding:15px;
      border-radius:10px;
    }

    .grid { display:flex; gap:20px; }

    .box {
      flex:1; background:white; padding:20px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item active" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

  <div class="topbar">
    <h1>Hello, Amit 👋</h1>
    <div class="logout" onclick="logout()">⏻</div>
  </div>

  <div class="cards">
    <div class="card">Leads: 120</div>
    <div class="card">Deals: 25</div>
    <div class="card">Revenue: ₹5L</div>
    <div class="card">Follow-ups: 8</div>
  </div>

  <div class="grid">
    <div class="box">
      <h3>Sales Performance</h3>
      <canvas id="salesChart"></canvas>
    </div>

    <div class="box">
      <h3>Monthly Growth</h3>
      <canvas id="growthChart"></canvas>
    </div>
  </div>

</div>

<script>
function go(p){ window.location.href=p; }
function logout(){ window.location.href="index.html"; }

new Chart(document.getElementById("salesChart"), {
  type:'line',
  data:{ labels:["Jan","Feb","Mar","Apr","May","Jun"],
  datasets:[{data:[5,8,6,10,12,9]}] }
});

new Chart(document.getElementById("growthChart"), {
  type:'bar',
  data:{ labels:["Jan","Feb","Mar","Apr","May","Jun"],
  datasets:[{data:[10,20,15,30,25,35]}] }
});
</script>

</body>
</html>
