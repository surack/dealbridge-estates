<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }

    body { background:#F1F5F9; }

    /* Sidebar */
    .sidebar {
      width:180px; height:100vh;
      background:#1E293B; color:white;
      padding:20px; position:fixed;
      top:0; left:0;
    }

    .logo { font-size:22px; font-weight:700; margin-bottom:30px; }

    .menu-item {
      padding:10px; margin:10px 0;
      border-radius:8px; cursor:pointer;
    }

    .menu-item:hover, .active { background:#2563EB; }

    /* Main */
    .main {
      margin-left:200px;
      padding:20px;
      width:calc(100% - 200px);
    }

    .topbar {
      display:flex; justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .logout {
      font-size:26px;
      cursor:pointer;
      color:#EF4444;
    }

    /* PREMIUM CARDS */
    .cards {
      display:flex;
      gap:20px;
      margin:25px 0;
    }

    .card {
      flex:1;
      padding:22px;
      border-radius:14px;
      color:white;
      position:relative;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-5px);
    }

    /* Card colors */
    .leads { background:linear-gradient(135deg,#3B82F6,#1E40AF); }
    .deals { background:linear-gradient(135deg,#22C55E,#15803D); }
    .revenue { background:linear-gradient(135deg,#F59E0B,#B45309); }
    .followups { background:linear-gradient(135deg,#EF4444,#991B1B); }

    .card h4 {
      font-size:14px;
      opacity:0.9;
    }

    .card h2 {
      font-size:28px;
      margin-top:8px;
      font-weight:600;
    }

    .icon {
      position:absolute;
      right:15px;
      top:15px;
      font-size:30px;
      opacity:0.3;
    }

    /* Charts */
    .grid {
      display:flex;
      gap:20px;
      margin-top:10px;
    }

    .box {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 6px 15px rgba(0,0,0,0.05);
    }

    .box h3 {
      margin-bottom:10px;
      color:#1E293B;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item active" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

  <div class="topbar">
    <h1>Hello, Amit 👋</h1>
    <div class="logout" onclick="logout()">⏻</div>
  </div>

  <!-- PREMIUM CARDS -->
  <div class="cards">

    <div class="card leads">
      <div class="icon">👥</div>
      <h4>Total Leads</h4>
      <h2>120</h2>
    </div>

    <div class="card deals">
      <div class="icon">🤝</div>
      <h4>Deals Closed</h4>
      <h2>25</h2>
    </div>

    <div class="card revenue">
      <div class="icon">💰</div>
      <h4>Total Revenue</h4>
      <h2>₹5L</h2>
    </div>

    <div class="card followups">
      <div class="icon">📞</div>
      <h4>Follow-ups</h4>
      <h2>8</h2>
    </div>

  </div>

  <!-- CHARTS -->
  <div class="grid">

    <div class="box">
      <h3>Sales Performance</h3>
      <canvas id="salesChart"></canvas>
    </div>

    <div class="box">
      <h3>Monthly Growth</h3>
      <canvas id="growthChart"></canvas>
    </div>

  </div>

</div>

<script>
function go(p){ window.location.href=p; }
function logout(){ window.location.href="index.html"; }

new Chart(document.getElementById("salesChart"), {
  type:'line',
  data:{
    labels:["Jan","Feb","Mar","Apr","May","Jun"],
    datasets:[{
      data:[5,8,6,10,12,9],
      borderWidth:2,
      tension:0.4
    }]
  }
});

new Chart(document.getElementById("growthChart"), {
  type:'bar',
  data:{
    labels:["Jan","Feb","Mar","Apr","May","Jun"],
    datasets:[{
      data:[10,20,15,30,25,35],
      borderWidth:1
    }]
  }
});
</script>

</body>
</html>
