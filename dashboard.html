<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - DealBridge Estates</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      background: #F1F5F9;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #1E293B;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar p {
      margin: 15px 0;
      cursor: pointer;
      opacity: 0.8;
    }

    .sidebar p:hover {
      opacity: 1;
    }

    /* Main */
    .main {
      margin-left: 230px;
      width: 100%;
      padding: 20px;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 {
      color: #1E293B;
    }

    .btn {
      background: #2563EB;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1E40AF;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #1E293B;
    }

    /* Leads Table */
    .table-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #F8FAFC;
    }

  </style>

</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DealBridge</h2>
    <p>Dashboard</p>
    <p>My Leads</p>
    <p>Follow-ups</p>
    <p>Properties</p>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1>Welcome, Sales</h1>
      <button class="btn">+ Add Lead</button>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>My Leads</h3>
        <p>12</p>
      </div>

      <div class="card">
        <h3>Follow-ups Today</h3>
        <p>3</p>
      </div>

      <div class="card">
        <h3>Deals Closed</h3>
        <p>2</p>
      </div>
    </div>

    <!-- Leads Table -->
    <div class="table-section">
      <h3>Recent Leads</h3>

      <table>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>Ravi</td>
          <td>9876543210</td>
          <td>New</td>
        </tr>

        <tr>
          <td>Amit</td>
          <td>9123456780</td>
          <td>Contacted</td>
        </tr>

      </table>

    </div>

  </div>

</body>
</html>
