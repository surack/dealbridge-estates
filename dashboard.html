<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
    body { background:#F1F5F9; }

    .sidebar { width:180px; height:100vh; background:#1E293B; color:white; padding:20px; position:fixed; }
    .logo { font-size:22px; font-weight:700; margin-bottom:30px; }

    .menu-item { padding:10px; margin:10px 0; border-radius:8px; cursor:pointer; }
    .menu-item:hover, .active { background:#2563EB; }

    .main { margin-left:200px; padding:20px; }

    .topbar { display:flex; justify-content:space-between; align-items:center; }

    .logout { font-size:26px; cursor:pointer; color:#EF4444; }

    .cards { display:flex; gap:20px; margin:25px 0; }

    .card {
      flex:1;
      padding:22px;
      border-radius:14px;
      color:white;
    }

    .leads { background:linear-gradient(135deg,#3B82F6,#1E40AF); }
    .deals { background:linear-gradient(135deg,#22C55E,#15803D); }
    .revenue { background:linear-gradient(135deg,#F59E0B,#B45309); }
    .followups { background:linear-gradient(135deg,#EF4444,#991B1B); }

    .grid { display:flex; gap:20px; }

    .box { flex:1; background:white; padding:20px; border-radius:12px; }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>
</div>

<div class="main">

  <div class="topbar">
    <h1 id="welcome"></h1>
    <div class="logout" onclick="logout()">⏻</div>
  </div>

  <div class="cards">
    <div class="card leads"><h4>Total Leads</h4><h2 id="leads">0</h2></div>
    <div class="card deals"><h4>Deals</h4><h2 id="deals">0</h2></div>
    <div class="card revenue"><h4>Revenue</h4><h2 id="revenue">0</h2></div>
    <div class="card followups"><h4>Follow-ups</h4><h2 id="followups">0</h2></div>
  </div>

  <div class="grid">
    <div class="box"><canvas id="salesChart"></canvas></div>
    <div class="box"><canvas id="growthChart"></canvas></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
  authDomain: "deal-bridge-estates.firebaseapp.com",
  databaseURL: "https://deal-bridge-estates-default-rtdb.firebaseio.com/",
  projectId: "deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* 🔐 AUTO LOGIN + SECURITY */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(user => {
  if(!user){
    window.location.href = "index.html";
  } else {
    let username = user.email.split("@")[0];
    document.getElementById("welcome").innerText = "Hello, " + username + " 👋";

    loadData(username);
  }
});

/* 🚪 LOGOUT */
function logout(){
  auth.signOut().then(()=>{
    window.location.href="index.html";
  });
}

/* 📊 LOAD DATA FROM DATABASE */
function loadData(username){

  db.ref("users/" + username).on("value", snapshot => {

    let data = snapshot.val();

    if(!data) return;

    document.getElementById("leads").innerText = data.leads || 0;
    document.getElementById("deals").innerText = data.deals || 0;
    document.getElementById("revenue").innerText = "₹" + data.revenue || 0;
    document.getElementById("followups").innerText = data.followups || 0;

    let months = getLast6Months();

    new Chart(document.getElementById("salesChart"), {
      type:'line',
      data:{ labels: months, datasets:[{ data: data.sales || [] }] }
    });

    new Chart(document.getElementById("growthChart"), {
      type:'bar',
      data:{ labels: months, datasets:[{ data: data.growth || [] }] }
    });

  });
}

/* 📅 MONTHS */
function getLast6Months(){
  const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let res = [];
  let d = new Date();

  for(let i=5;i>=0;i--){
    let temp = new Date(d.getFullYear(), d.getMonth()-i, 1);
    res.push(m[temp.getMonth()]);
  }
  return res;
}
</script>

</body>
</html>
