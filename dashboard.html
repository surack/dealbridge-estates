<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
    body { background:#F1F5F9; }

    .sidebar {
      width:180px; height:100vh;
      background:#1E293B; color:white;
      padding:20px; position:fixed;
    }

    .logo { font-size:22px; font-weight:700; margin-bottom:30px; }

    .menu-item {
      padding:10px; margin:10px 0;
      border-radius:8px; cursor:pointer;
    }

    .menu-item:hover, .active { background:#2563EB; }

    .main {
      margin-left:200px;
      padding:20px;
    }

    .topbar {
      display:flex; justify-content:space-between;
      align-items:center;
    }

    .logout {
      font-size:26px;
      cursor:pointer;
      color:#EF4444;
    }

    .cards {
      display:flex;
      gap:20px;
      margin:25px 0;
    }

    .card {
      flex:1;
      padding:22px;
      border-radius:14px;
      color:white;
      position:relative;
    }

    .leads { background:linear-gradient(135deg,#3B82F6,#1E40AF); }
    .deals { background:linear-gradient(135deg,#22C55E,#15803D); }
    .revenue { background:linear-gradient(135deg,#F59E0B,#B45309); }
    .followups { background:linear-gradient(135deg,#EF4444,#991B1B); }

    .icon {
      position:absolute;
      right:15px;
      top:15px;
      opacity:0.3;
    }

    .grid {
      display:flex;
      gap:20px;
      margin-top:10px;
    }

    .box {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 6px 15px rgba(0,0,0,0.05);
    }

    .box h3 {
      margin-bottom:10px;
      color:#1E293B;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item active" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

  <div class="topbar">
    <h1 id="welcome"></h1>
    <div class="logout" onclick="logout()">⏻</div>
  </div>

  <div class="cards">

    <div class="card leads">
      <div class="icon">👥</div>
      <h4>Total Leads</h4>
      <h2 id="leads">0</h2>
    </div>

    <div class="card deals">
      <div class="icon">🤝</div>
      <h4>Deals Closed</h4>
      <h2 id="deals">0</h2>
    </div>

    <div class="card revenue">
      <div class="icon">💰</div>
      <h4>Total Revenue</h4>
      <h2 id="revenue">0</h2>
    </div>

    <div class="card followups">
      <div class="icon">📞</div>
      <h4>Follow-ups</h4>
      <h2 id="followups">0</h2>
    </div>

  </div>

  <div class="grid">

    <div class="box">
      <h3>Monthly Sales Performance</h3>
      <canvas id="salesChart"></canvas>
    </div>

    <div class="box">
      <h3>Monthly Revenue Growth</h3>
      <canvas id="growthChart"></canvas>
    </div>

  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
  authDomain: "deal-bridge-estates.firebaseapp.com",
  databaseURL: "https://deal-bridge-estates-default-rtdb.firebaseio.com/",
  projectId: "deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* 🔐 AUTH CHECK */
auth.onAuthStateChanged(user => {

  if(!user){
    window.location.href = "index.html";
  } else {

    let username = user.email.split("@")[0];

    document.getElementById("welcome").innerText =
      "Hello, " + username + " 👋";

    loadDashboardData(username);
  }

});

/* 🚪 LOGOUT */
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "index.html";
  });
}

/* 📊 LOAD DATA */
let salesChart, growthChart;

function loadDashboardData(username){

  db.ref("users/" + username).on("value", snapshot => {

    let data = snapshot.val();
    if(!data) return;

    document.getElementById("leads").innerText = data.leads || 0;
    document.getElementById("deals").innerText = data.deals || 0;
    document.getElementById("revenue").innerText = "₹" + (data.revenue || 0);
    document.getElementById("followups").innerText = data.followups || 0;

    let months = getLast6Months();

    if(salesChart) salesChart.destroy();
    if(growthChart) growthChart.destroy();

    salesChart = new Chart(document.getElementById("salesChart"), {
      type:'line',
      data:{
        labels: months,
        datasets:[{
          data: data.sales || [],
          borderWidth:2,
          tension:0.4
        }]
      },
      options:{
        plugins:{
          legend:{ display:false }   // ✅ REMOVED UNDEFINED
        }
      }
    });

    growthChart = new Chart(document.getElementById("growthChart"), {
      type:'bar',
      data:{
        labels: months,
        datasets:[{
          data: data.growth || []
        }]
      },
      options:{
        plugins:{
          legend:{ display:false }   // ✅ REMOVED UNDEFINED
        }
      }
    });

  });
}

/* 📅 MONTHS */
function getLast6Months(){
  const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let res = [];
  let d = new Date();

  for(let i=5;i>=0;i--){
    let temp = new Date(d.getFullYear(), d.getMonth()-i, 1);
    res.push(m[temp.getMonth()]);
  }

  return res;
}

function go(p){ window.location.href=p; }
</script>

</body>
</html>
