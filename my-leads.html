<!DOCTYPE html>
<html>
<head>
<title>My Leads</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
body { display:flex; background:#F1F5F9; }

.sidebar {
  width:180px; height:100vh;
  background:#1E293B; color:white;
  padding:20px; position:fixed;
}

.logo { font-size:22px; font-weight:700; margin-bottom:30px; }

.menu-item { padding:10px; margin:10px 0; cursor:pointer; border-radius:8px; }
.menu-item:hover, .active { background:#2563EB; }

.main {
  margin-left:200px;
  padding:20px;
  width:calc(100% - 200px);
}

/* SPACING FIX */
.main h1 {
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  padding:10px;
  background:#2563EB;
  color:white;
  border:none;
  border-radius:6px;
  margin-bottom:20px;
  cursor:pointer;
}

/* LEAD CARD */
.lead {
  background:white;
  padding:15px;
  margin-bottom:12px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.lead h3 {
  margin-bottom:5px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item active">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">
  <h1>My Leads</h1>

  <button class="btn">+ Add Lead</button>

  <div class="lead">
    <h3>Ravi Sharma</h3>
    <p>Budget: ₹50L</p>
    <p>Status: New</p>
  </div>

  <div class="lead">
    <h3>Amit Verma</h3>
    <p>Budget: ₹75L</p>
    <p>Status: Contacted</p>
  </div>

  <div class="lead">
    <h3>Neha Singh</h3>
    <p>Budget: ₹40L</p>
    <p>Status: Visit Scheduled</p>
  </div>

</div>

<script>
function go(p){ window.location.href=p; }
</script>

</body>
</html>
