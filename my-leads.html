<!DOCTYPE html>
<html>
<head>
<title>My Leads</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
body { background:#F1F5F9; }

/* Sidebar */
.sidebar {
  width:180px; height:100vh;
  background:#1E293B; color:white;
  padding:20px; position:fixed;
}

.logo { font-size:22px; font-weight:700; margin-bottom:30px; }

.menu-item { padding:10px; margin:10px 0; cursor:pointer; border-radius:8px; }
.menu-item:hover, .active { background:#2563EB; }

/* Main */
.main {
  margin-left:200px;
  padding:20px;
  width:calc(100% - 200px);
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.btn {
  padding:10px 15px;
  background:#2563EB;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn:hover { background:#1E40AF; }

/* MAIN GRID */
.main-grid {
  display:flex;
  gap:20px;
}

/* SECTION (Residential / Commercial) */
.section {
  flex:1;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.section h2 {
  margin-bottom:15px;
  color:#1E293B;
}

/* SUB GRID */
.sub-grid {
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* SUB SECTION */
.sub-section {
  background:#F8FAFC;
  padding:15px;
  border-radius:10px;
}

/* SUB TITLE */
.sub-section h3 {
  margin-bottom:10px;
  font-size:15px;
  color:#2563EB;
}

/* LEAD CARD */
.lead {
  background:white;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  font-size:14px;
  box-shadow:0 3px 8px rgba(0,0,0,0.04);
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DealBridge Estates</div>

  <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="menu-item active">My Leads</div>
  <div class="menu-item" onclick="go('my-day.html')">My Day</div>
  <div class="menu-item" onclick="go('followups.html')">Follow-ups</div>
  <div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h1>My Leads</h1>
    <button class="btn">+ Add Lead</button>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- RESIDENTIAL -->
    <div class="section">
      <h2>🏠 Residential</h2>

      <div class="sub-grid">

        <div class="sub-section">
          <h3>House</h3>

          <div class="lead">Ravi - ₹50L - New</div>
          <div class="lead">Amit - ₹75L - Contacted</div>
        </div>

        <div class="sub-section">
          <h3>Shops</h3>

          <div class="lead">Neha - ₹40L - Visit</div>
        </div>

        <div class="sub-section">
          <h3>Plots</h3>

          <div class="lead">Raj - ₹30L - New</div>
        </div>

      </div>
    </div>

    <!-- COMMERCIAL -->
    <div class="section">
      <h2>🏢 Commercial</h2>

      <div class="sub-grid">

        <div class="sub-section">
          <h3>House</h3>

          <div class="lead">Karan - ₹90L</div>
        </div>

        <div class="sub-section">
          <h3>Shops</h3>

          <div class="lead">Suresh - ₹25K Rent</div>
        </div>

        <div class="sub-section">
          <h3>Plots</h3>

          <div class="lead">Vikas - ₹60L</div>
        </div>

      </div>
    </div>

  </div>

</div>

<script>
function go(p){ window.location.href=p; }
</script>

</body>
</html>
