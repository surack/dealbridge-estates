<!DOCTYPE html>
<html>
<head>
<title>My Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9;display:none}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:white;padding:20px;position:fixed}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Top Card */
.top-card{
background:linear-gradient(135deg,#3B82F6,#1E40AF);
color:white;padding:20px;border-radius:14px;margin-bottom:20px;
}

/* Filters */
.filters{
display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
}

/* Card */
.card{
background:white;padding:18px;border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* Labels */
.label{font-size:12px;color:#64748B;}
.value{font-size:14px;margin-bottom:6px;}

.tag{
display:inline-block;padding:4px 8px;border-radius:6px;
font-size:11px;margin-right:5px;background:#DBEAFE;
}

.input{width:100%;padding:6px;margin-bottom:6px}

/* Buttons */
.actions{display:flex;gap:10px;margin-top:10px;}
.btn{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;}
.convert{background:#22C55E;color:white;}
.leave{background:#EF4444;color:white;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>

<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-day.html')">My Day</div>
<div class="menu-item active">My Leads</div>
<div class="menu-item" onclick="go('all-leads.html')">All Leads</div>
<div class="menu-item" onclick="go('properties.html')">Properties</div>
<div class="menu-item" onclick="go('my-deals.html')">My Deals</div>

</div>

<div class="main">

<div class="top-card">
<h2 id="totalLeads">0 Leads</h2>
<p>Your assigned leads</p>
</div>

<!-- FILTERS -->
<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">

<select id="typeFilter" onchange="render()">
<option value="">All Type</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="categoryFilter" onchange="render()">
<option value="">All Category</option>
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
</select>

<select id="propertyFilter" onchange="render()">
<option value="">All Property</option>
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="statusFilter" onchange="render()">
<option value="">All Status</option>
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="visit">Visit</option>
<option value="closed">Closed</option>
</select>
</div>

<div class="grid" id="container"></div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let currentUser="";
let allLeads={};

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}else{
document.body.style.display="block";
currentUser=user.email.split("@")[0];
load();
}
});

/* LOAD */
function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

/* RENDER */
function render(){

let search=val("search").toLowerCase();
let typeF=val("typeFilter");
let catF=val("categoryFilter");
let propF=val("propertyFilter");
let statusF=val("statusFilter");

let container=document.getElementById("container");
container.innerHTML="";

let count=0;

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(l.assignedTo!==currentUser) return;

if(search && !l.name.toLowerCase().includes(search)) return;
if(typeF && l.type!==typeF) return;
if(catF && l.category!==catF) return;
if(propF && l.propertyType!==propF) return;
if(statusF && l.status!==statusF) return;

count++;

container.innerHTML+=`
<div class="card">

<h3>${l.name}</h3>

<div class="label">📱 Mobile</div>
<div class="value">${l.phone}</div>

<div class="label">📍 Location</div>
<div class="value">${l.location || "-"}</div>

<div class="label">📐 Area</div>
<div class="value">${l.area || "-"}</div>

<div class="label">💰 Budget</div>
<div class="value">₹${l.budgetMin || "-"} - ₹${l.budgetMax || "-"}</div>

<div class="label">🏷 Property</div>
<div class="value">
<span class="tag">${l.type}</span>
<span class="tag">${l.category}</span>
<span class="tag">${l.propertyType}</span>
</div>

<div class="label">📝 Remark</div>
<div class="value">${l.remark || "-"}</div>

<div class="label">📊 Status</div>
<select class="input" onchange="updateStatus('${id}',this.value)">
<option ${l.status==="new"?"selected":""}>new</option>
<option ${l.status==="contacted"?"selected":""}>contacted</option>
<option ${l.status==="visit"?"selected":""}>visit</option>
<option ${l.status==="closed"?"selected":""}>closed</option>
</select>

<!-- CALL -->
<div class="label">📞 Call Schedule</div>
<input class="input" type="date" value="${l.callDate || ""}" onchange="updateField('${id}','callDate',this.value)">
<input class="input" type="time" value="${l.callTime || ""}" onchange="updateField('${id}','callTime',this.value)">

<!-- VISIT -->
<div class="label">🏠 Visit Schedule</div>
<input class="input" type="date" value="${l.visitDate || ""}" onchange="updateField('${id}','visitDate',this.value)">
<input class="input" type="time" value="${l.visitTime || ""}" onchange="updateField('${id}','visitTime',this.value)">

<div class="actions">
<button class="btn convert" onclick="convert('${id}')">Convert</button>
<button class="btn leave" onclick="leave('${id}')">Leave</button>
</div>

</div>
`;
});

document.getElementById("totalLeads").innerText = count + " Leads";

}

/* UPDATE FIELD */
function updateField(id,field,value){
db.ref("leads/"+id+"/"+field).set(value);
}

/* STATUS */
function updateStatus(id,status){
db.ref("leads/"+id).update({status});
}

/* ✅ FINAL CORRECT CONVERT */
function convert(id){

let now=new Date();

db.ref("leads/"+id).once("value").then(snap=>{
let data=snap.val();

/* Add conversion info */
data.convertedDate=now.toISOString().split("T")[0];
data.convertedTime=now.toLocaleTimeString();

/* Move */
db.ref("deals/"+id).set(data);
db.ref("leads/"+id).remove();

/* ✅ Update EXISTING user deals field */
let userRef = db.ref("users/"+currentUser+"/deals");

userRef.once("value").then(s=>{
let current = s.val() || 0;
userRef.set(current + 1);
});

});

}

/* LEAVE */
function leave(id){
db.ref("leads/"+id).update({assignedTo:""});
}

/* HELPERS */
function val(id){return document.getElementById(id).value}
function go(p){window.location.href=p;}

</script>

</body>
</html>
