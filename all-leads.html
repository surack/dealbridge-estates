<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{width:180px;height:100vh;background:#1E293B;color:white;padding:20px;position:fixed;}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer;}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn{padding:10px 16px;background:#2563EB;color:white;border:none;border-radius:8px;cursor:pointer}

/* Counter */
.top-card{background:#2563EB;color:white;padding:20px;border-radius:14px;margin-bottom:20px}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.filters input,.filters select{padding:10px;border-radius:8px;border:1px solid #ccc;}

/* Cards */
.leads-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}

.card{background:white;padding:18px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}

.tag{padding:4px 8px;border-radius:6px;font-size:11px;background:#DBEAFE;margin-right:5px;}
.manage{margin-top:10px;width:100%;padding:8px;background:#22C55E;color:white;border:none;border-radius:8px;cursor:pointer;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.popup-box{background:white;padding:25px;border-radius:14px;width:380px;max-height:90vh;overflow-y:auto;}

.popup input,.popup select,.popup textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc;}

.actions{display:flex;gap:10px;}
.save-btn{flex:1;padding:10px;background:#2563EB;color:white;border:none;border-radius:8px;}
.cancel-btn{flex:1;padding:10px;background:#E2E8F0;border:none;border-radius:8px;}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
<div class="menu-item" onclick="go('my-day.html')">My Day</div>
<div class="menu-item active">All Leads</div>
<div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

<div class="header">
<h1>All Leads</h1>
<button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<div class="top-card">
<h2 id="totalLeads">0 Leads</h2>
</div>

<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">
<select id="typeFilter" onchange="render()">
<option value="">All</option><option value="buy">Buy</option><option value="rent">Rent</option>
</select>
</div>

<div class="leads-container" id="leadsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="area" placeholder="Area">
<input id="budgetMin" placeholder="Budget Min">
<input id="budgetMax" placeholder="Budget Max">

<select id="type"><option value="buy">Buy</option><option value="rent">Rent</option></select>
<select id="category"><option value="residential">Residential</option><option value="commercial">Commercial</option></select>
<select id="propertyType"><option value="house">House</option><option value="shop">Shop</option><option value="plot">Plot</option></select>
<select id="urgency"><option value="low">Low</option><option value="high">High</option></select>

<textarea id="remark" placeholder="Remark"></textarea>

<div class="actions">
<button class="cancel-btn" onclick="closePopup()">Cancel</button>
<button class="save-btn" onclick="addLead()">Save</button>
</div>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

let allLeads={}, currentUser="";

/* AUTH */
auth.onAuthStateChanged(user=>{
if(!user){window.location.href="index.html";}
else{currentUser=user.email.split("@")[0];load();}
});

/* LOAD */
function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

/* RENDER */
function render(){
let container=document.getElementById("leadsContainer");
container.innerHTML="";
let count=0;

Object.keys(allLeads).forEach(id=>{
let l=allLeads[id];
count++;

let btn = !l.assignedTo ? `<button class="manage" onclick="assign('${id}')">Assign to Me</button>` : "";

container.innerHTML+=`
<div class="card">
<h3>${l.name}</h3>
<p>${l.phone}</p>
<p>${l.location||""}</p>
<p><b>Area:</b> ${l.area||"-"}</p>
<p><b>Urgency:</b> ${l.urgency||"-"}</p>
<p><b>Remark:</b> ${l.remark||"-"}</p>
<p><b>Assigned:</b> ${l.assignedTo||"None"}</p>
${btn}
</div>
`;
});

document.getElementById("totalLeads").innerText = count + " Leads";
}

/* ADD LEAD */
function addLead(){
let name=val("name"), phone=val("phone");

if(!name||!phone){alert("Fill required");return;}

let key=db.ref("leads").push().key;

db.ref("leads/"+key).set({
name,phone,
location:val("location"),
area:val("area"),
budgetMin:val("budgetMin"),
budgetMax:val("budgetMax"),
type:val("type"),
category:val("category"),
propertyType:val("propertyType"),
urgency:val("urgency"),
remark:val("remark"),
status:"new",
assignedTo:""
}).then(()=>{
clearForm(); closePopup();
});
}

/* ASSIGN */
function assign(id){
db.ref("leads/"+id).update({assignedTo:currentUser});

let ref=db.ref("users/"+currentUser+"/leads");
ref.once("value").then(s=>{
ref.set((s.val()||0)+1);
});
}

/* HELPERS */
function val(id){return document.getElementById(id).value;}
function clearForm(){document.querySelectorAll(".popup input,.popup textarea").forEach(i=>i.value="");}
function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}
function go(p){window.location.href=p;}

</script>

</body>
</html>
