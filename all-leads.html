<!DOCTYPE html>
<html>
<head>
<title>All Leads</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{
width:180px;height:100vh;
background:#1E293B;color:white;
padding:20px;position:fixed;
}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer;}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn{
padding:10px 16px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Counter */
.top-card{
background:linear-gradient(135deg,#3B82F6,#1E40AF);
color:white;padding:20px;border-radius:14px;margin-bottom:20px;
}

/* Filters */
.filters{
display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Cards */
.leads-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
}

/* PROFESSIONAL CARD */
.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

/* Sections */
.section-title{
font-size:12px;
color:#64748B;
margin-top:10px;
}

.value{
font-size:14px;
margin-bottom:5px;
}

/* Tags */
.tag{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:11px;
margin-right:5px;
background:#DBEAFE;
}

.urgency-high{
background:#FECACA;
color:#991B1B;
}

.urgency-low{
background:#DCFCE7;
color:#166534;
}

.status-tag{
display:inline-block;
padding:5px 10px;
border-radius:8px;
font-size:11px;
background:#E0F2FE;
margin-top:8px;
}

/* Button */
.manage{
margin-top:12px;
width:100%;
padding:10px;
background:#22C55E;
color:white;border:none;border-radius:10px;
cursor:pointer;
font-weight:500;
}

/* Popup unchanged */
/* Popup */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;justify-content:center;align-items:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:14px;
width:380px;
max-height:90vh;
overflow-y:auto;
}

.popup input,.popup select,.popup textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
}

.actions{
display:flex;
gap:10px;
}

.save-btn{
flex:1;
padding:10px;
background:#2563EB;
color:white;
border:none;
border-radius:8px;
}

.cancel-btn{
flex:1;
padding:10px;
background:#E2E8F0;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
<div class="menu-item" onclick="go('my-day.html')">My Day</div>
<div class="menu-item active">All Leads</div>
<div class="menu-item" onclick="go('properties.html')">Properties</div>
</div>

<div class="main">

<div class="header">
<h1>All Leads</h1>
<button class="btn" onclick="openPopup()">+ Add Lead</button>
</div>

<div class="top-card">
<h2 id="totalLeads">0 Leads</h2>
<p>Total available leads</p>
</div>

<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">

<select id="typeFilter" onchange="render()">
<option value="">All Type</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="categoryFilter" onchange="render()">
<option value="">All Category</option>
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
</select>

<select id="propertyFilter" onchange="render()">
<option value="">All Property</option>
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="statusFilter" onchange="render()">
<option value="">All Status</option>
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="visit">Visit</option>
<option value="closed">Closed</option>
</select>

<!-- ✅ NEW URGENCY FILTER -->
<select id="urgencyFilter" onchange="render()">
<option value="">All Urgency</option>
<option value="low">Low</option>
<option value="high">High</option>
</select>

<select id="assignFilter" onchange="render()">
<option value="">All Leads</option>
<option value="unassigned">Unassigned</option>
<option value="assigned">Assigned</option>
</select>
</div>

<div class="leads-container" id="leadsContainer"></div>

</div>

  <!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Lead</h3>

<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Location">

<input id="area" placeholder="Area">
<input id="budgetMin" placeholder="Budget Min">
<input id="budgetMax" placeholder="Budget Max">

<select id="type">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select id="category">
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
</select>

<select id="propertyType">
<option value="house">House</option>
<option value="shop">Shop</option>
<option value="plot">Plot</option>
</select>

<select id="urgency">
<option value="low">Low</option>
<option value="high">High</option>
</select>

<textarea id="remark" placeholder="Remark"></textarea>

<div class="actions">
<button class="cancel-btn" onclick="closePopup()">Cancel</button>
<button class="save-btn" onclick="addLead()">Save</button>
</div>

</div>
</div>

<script>

/* 🔴 DO NOT CHANGE LOGIC BELOW */

const firebaseConfig={
apiKey:"AIzaSyBHswtiTozfR5xVZUOWtg_pTNtXjiCQJF0",
authDomain:"deal-bridge-estates.firebaseapp.com",
databaseURL:"https://deal-bridge-estates-default-rtdb.firebaseio.com/",
projectId:"deal-bridge-estates"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const auth=firebase.auth();

let allLeads={};
let currentUser="";

auth.onAuthStateChanged(user=>{
if(!user){window.location.href="index.html";}
else{currentUser=user.email.split("@")[0];load();}
});

function load(){
db.ref("leads").on("value",snap=>{
allLeads=snap.val()||{};
render();
});
}

function render(){

let search=val("search").toLowerCase();
let typeF=val("typeFilter");
let catF=val("categoryFilter");
let propF=val("propertyFilter");
let statusF=val("statusFilter");
let assignF=val("assignFilter");
let urgencyF=val("urgencyFilter");

let container=document.getElementById("leadsContainer");
container.innerHTML="";

let count=0;

Object.keys(allLeads).forEach(id=>{

let l=allLeads[id];

if(search && !l.name.toLowerCase().includes(search)) return;
if(typeF && l.type!==typeF) return;
if(catF && l.category!==catF) return;
if(propF && l.propertyType!==propF) return;
if(statusF && l.status!==statusF) return;
if(urgencyF && l.urgency!==urgencyF) return;

if(assignF==="unassigned" && l.assignedTo) return;
if(assignF==="assigned" && !l.assignedTo) return;

count++;

let btn="";
if(!l.assignedTo){
btn=`<button class="manage" onclick="assign('${id}')">Assign to Me</button>`;
}

container.innerHTML+=`
<div class="card">

<h3>${l.name}</h3>

<div class="section-title">Contact</div>
<div class="value">${l.phone}</div>
<div class="value">${l.location || "-"}</div>

<div class="section-title">Property</div>
<span class="tag">${l.type}</span>
<span class="tag">${l.category}</span>
<span class="tag">${l.propertyType}</span>

<div class="section-title">Budget</div>
<div class="value">₹${l.budgetMin || "-"} - ${l.budgetMax || "-"}</div>

<div class="section-title">Area</div>
<div class="value">${l.area || "-"}</div>

<div class="section-title">Urgency</div>
<div class="value ${l.urgency==='high'?'urgency-high':'urgency-low'}">${l.urgency}</div>

<div class="section-title">Remark</div>
<div class="value">${l.remark || "-"}</div>

<div class="status-tag">Status: ${l.status}</div>

<p><b>Assigned:</b> ${l.assignedTo || "None"}</p>

${btn}

</div>
`;
});

document.getElementById("totalLeads").innerText = count + " Leads";
}
/* ✅ UPDATED ADD LEAD */
function addLead(){

let name=val("name").trim();
let phone=val("phone").trim();

if(!name || !phone){
alert("Enter name & phone");
return;
}

let now=new Date();

let key=db.ref("leads").push().key;

db.ref("leads/"+key).set({
leadId:"L-"+Date.now(),
name,
phone,
location:val("location"),
area:val("area"),
budgetMin:val("budgetMin"),
budgetMax:val("budgetMax"),
type:val("type"),
category:val("category"),
propertyType:val("propertyType"),
urgency:val("urgency"),
remark:val("remark"),
status:"new",
assignedTo:"",

/* ✅ NEW FIELDS */
addedOn: now.toISOString().split("T")[0],
addedBy: currentUser

}).then(()=>{
clearForm();
closePopup();
});

}

function val(id){return document.getElementById(id).value}

function clearForm(){
document.querySelectorAll(".popup input, .popup textarea").forEach(i=>i.value="");
}
  
  
function val(id){return document.getElementById(id).value}

function clearForm(){
document.querySelectorAll(".popup input, .popup textarea").forEach(i=>i.value="");
}

function assign(id){
db.ref("leads/"+id).update({assignedTo:currentUser});
let ref=db.ref("users/"+currentUser+"/leads");
ref.once("value").then(s=>{ref.set((s.val()||0)+1);});
}

function go(page){
window.location.href=page;
}

function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}


</script>

</body>
</html>
