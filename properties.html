<!DOCTYPE html>
<html>
<head>
<title>Properties</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#F1F5F9}

/* Sidebar */
.sidebar{
width:180px;height:100vh;
background:#1E293B;color:white;
padding:20px;position:fixed;
}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-item{padding:10px;margin:10px 0;border-radius:8px;cursor:pointer;}
.menu-item:hover,.active{background:#2563EB}

/* Main */
.main{margin-left:200px;padding:25px}

/* Header */
.header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn{
padding:10px 16px;
background:linear-gradient(135deg,#2563EB,#1E40AF);
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Filters */
.filters{
display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
.filters input,.filters select{
padding:10px;border-radius:8px;border:1px solid #ccc;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

/* Card */
.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.tag{
display:inline-block;
padding:4px 8px;
background:#DBEAFE;
border-radius:6px;
font-size:11px;
margin-right:5px;
}

.label{font-size:12px;color:#64748B}
.value{font-size:14px;margin-bottom:6px}

/* Popup */
.popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:14px;
width:400px;
max-height:90vh;
overflow-y:auto;
}

.popup input,.popup select,.popup textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">DealBridge Estates</div>
<div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="menu-item" onclick="go('my-leads.html')">My Leads</div>
<div class="menu-item" onclick="go('my-day.html')">My Day</div>
<div class="menu-item" onclick="go('followups.html')">All Leads</div>
<div class="menu-item active">Properties</div>
</div>

<div class="main">

<div class="header">
<h1>Properties</h1>
<button class="btn" onclick="openPopup()">+ Add Property</button>
</div>

<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">
<select id="typeFilter" onchange="render()">
<option value="">All Type</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>
</div>

<div class="grid" id="container"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Add Property</h3>

<input id="title" placeholder="Title">
<select id="type"><option value="buy">Buy</option><option value="rent">Rent</option></select>
<select id="category"><option value="residential">Residential</option><option value="commercial">Commercial</option></select>
<select id="propertyType"><option value="house">House</option><option value="shop">Shop</option><option value="plot">Plot</option></select>

<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<input type="file" id="image">

<button onclick="addProperty()">Save</button>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const storage=firebase.storage();

let data={};

function load(){
db.ref("properties").on("value",snap=>{
data=snap.val()||{};
render();
});
}

function render(){

let container=document.getElementById("container");
container.innerHTML="";

Object.keys(data).forEach(id=>{

let p=data[id];

container.innerHTML+=`
<div class="card">
<img src="${p.imageUrl || 'https://via.placeholder.com/300'}">
<div class="card-body">

<h3>${p.title}</h3>

<div>
<span class="tag">${p.type}</span>
<span class="tag">${p.category}</span>
<span class="tag">${p.propertyType}</span>
</div>

<div class="label">Location</div>
<div class="value">${p.location}</div>

<div class="label">Price</div>
<div class="value">₹${p.price}</div>

</div>
</div>
`;
});

}

function addProperty(){

let file=document.getElementById("image").files[0];
let id="P-"+Date.now();

let ref=storage.ref("properties/"+id);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{

db.ref("properties/"+id).set({
title:val("title"),
type:val("type"),
category:val("category"),
propertyType:val("propertyType"),
location:val("location"),
price:val("price"),
imageUrl:url,
addedOn:new Date().toISOString().split("T")[0]
});

closePopup();
});

});

}

function val(id){return document.getElementById(id).value}
function go(p){window.location.href=p;}
function openPopup(){document.getElementById("popup").style.display="flex";}
function closePopup(){document.getElementById("popup").style.display="none";}

load();

</script>

</body>
</html>
